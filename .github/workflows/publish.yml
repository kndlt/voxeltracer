name: publish

# Publishes @sprited/voxeltracer to npm when a version tag is pushed,
# via npm Trusted Publishing (OIDC) — no token or secret involved.
# One-time setup on npmjs.com: package Settings -> Trusted Publisher ->
# GitHub Actions, repository sprited-ai/voxeltracer, workflow publish.yml.
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC for npm trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      # trusted publishing requires npm >= 11.5
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm test
      - run: npx tsc --noEmit
      - run: npm run build:lib
      - run: npm publish
